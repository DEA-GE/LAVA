#--exclusions----------------------------------------------------------------------

# deployment density
deployment_density: 10 # MW/km²

# exclusion container manual resolution and projection 
resolution_manual: null # meters
projection_manual: null # e.g. 'ESRI:54009' Mollweide (if used, then resolution needs to be set manually as well)

#landcover codes (buffer in meters) (here landcover codes for openeo as default example)
landcover_codes: #dictionary of landcover code with corresponding buffer in meters
  50: 100
  10: 0

#landcover codes (buffer in meters) (here landcover codes for openeo as default example)
#| Code | Class                    |
#| ---- | ------------------------ |
#| 10   | Tree cover               |
#| 20   | Shrubland                |
#| 30   | Grassland                |
#| 40   | Cropland                 |
#| 50   | Built-up                 |
#| 60   | Bare / sparse vegetation |
#| 70   | Snow and ice             |
#| 80   | Permanent water bodies   |
#| 90   | Herbaceous wetland       |
#| 95   | Mangroves                |
#| 100  | Moss and lichen          |

# Below, if you dont want to use some data then insert "null" (without quotation marks). This will skip the file during the exclusion calculation.

# DEM
max_elevation: 2000 #meters
max_slope: 15 #degrees
max_terrain_ruggedness: Null #terrain ruggedness index
north_facing_pixels: null # 1 (on) or 0 (off)

# population
max_population: 3 #people per pixel

# spatial elements (buffer in meters)
railways_buffer: 100
roads_buffer: 100
airports_buffer: 5000
waterbodies_buffer: 100
military_buffer: 100
coastlines_buffer: 500
protectedAreas_buffer: 0
transmission_lines_buffer: 100
generators_buffer: null
plants_buffer: null 

# additional exclusion rasters
max_forest_density: null # (0–10 % = non‑forest/scrub, 10–40 % = sparse woodland, 40–70 % = moderately dense forest, >70 % = dense forest).

# additional exclusion polygons
additional_exclusion_polygons_buffer: [] #list of buffers in meters in the order of the files in the "additional_exclusion_polygons"-folder in the region data folder

# energy resources
min_wind_speed: 4.5 #m/s
max_wind_speed: null #m/s

# inclusion filters (connected with AND logic) (meters)
substations_inclusion_buffer: null
transmission_inclusion_buffer: 50000
roads_inclusion_buffer: null

# area filter
min_pixels_connected: 0
min_pixels_x: # currently not working, use min_pixels_connected instead
min_pixels_y: # currently not working, use min_pixels_connected instead